<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Live Website</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 50px; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; background-color: #0070f3; color: white; border: none; border-radius: 5px; }
        #response { margin-top: 20px; font-size: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h1>Welcome to My Live Website!</h1>
    <button onclick="pingBackend()">Talk to Backend</button>
    <div id="response">Click the button to send a message to the server...</div>

    <script>
        async function pingBackend() {
            document.getElementById('response').innerText = "Connecting...";
            try {
                // When running locally, it talks to localhost. 
                // Later, we will change this URL to your live backend url!
                const res = await fetch('https://my-live-backend-uly8.onrender.com/api/message');
                const data = await res.json();
                document.getElementById('response').innerText = data.message;
            } catch (err) {
                document.getElementById('response').innerText = "Error: Could not reach backend server.";
            }
        }
    </script>
</body>
</html>
